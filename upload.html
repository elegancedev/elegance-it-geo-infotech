    /* -------------------------------------------------------------------------
       CSS RESET & BASE STYLES
       ------------------------------------------------------------------------- */
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;
      background:#0a0a0f;  /* Dark background color */
      color:#fff;
      overflow-x:hidden
    }
    
    /* -------------------------------------------------------------------------
       GRADIENT TEXT - For highlighted headings
       ------------------------------------------------------------------------- */
    .gradient-text{
      background:linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 50%, #ec4899 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text
    }
    
    /* -------------------------------------------------------------------------
       GLASS MORPHISM - Frosted glass effect for cards
       ------------------------------------------------------------------------- */
    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.1)
    }
    
    /* -------------------------------------------------------------------------
       BACKGROUND GRID - Subtle grid pattern for hero section
       ------------------------------------------------------------------------- */
    .bg-grid{
      background-image:

        linear-gradient(90deg,rgba(14,165,233,.03) 1px, transparent 1px);
      background-size:50px 50px
    }
    
    /* -------------------------------------------------------------------------
       ANIMATIONS - Keyframe definitions
       ------------------------------------------------------------------------- */
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    
    .animate-float{animation:float 6s ease-in-out infinite}
    .animate-pulse-slow{animation:pulse 4s ease-in-out infinite}
    .animate-spin-slow{animation:spin 20s linear infinite}
    
    /* -------------------------------------------------------------------------
       NAVIGATION STYLES - Fixed header with scroll effects
       ------------------------------------------------------------------------- */
    .nav-fixed{position:fixed;top:0;left:0;right:0;z-index:50;transition:all .3s}
    .nav-scrolled{
      background:rgba(10,10,15,.8);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.1)
    }
    
    /* -------------------------------------------------------------------------
       BUTTON STYLES - Primary CTA buttons
       ------------------------------------------------------------------------- */
    .btn-primary{
      background:linear-gradient(135deg,#0ea5e9,#8b5cf6);
      padding:.75rem 1.5rem;
      border-radius:9999px;
      color:#fff;
      font-weight:600;
      transition:all .3s
    }
    .btn-primary:hover{
      transform:scale(1.05);
      box-shadow:0 10px 30px rgba(14,165,233,.3)
    }
    
    /* -------------------------------------------------------------------------
       CARD STYLES - Service cards and general cards
       ------------------------------------------------------------------------- */
    .card{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.1);
      border-radius:1rem;
      padding:1.5rem;
      transition:all .3s
    }
    .card:hover{
      border-color:rgba(14,165,233,.5);
      transform:translateY(-5px)
    }
    
    /* -------------------------------------------------------------------------
       TYPOGRAPHY STYLES
       ------------------------------------------------------------------------- */
    .section-title{
      font-family:'Poppins',sans-serif;
      font-weight:700;
      font-size:3rem
    }
    
    /* -------------------------------------------------------------------------
       SCROLL INDICATOR - Bouncing arrow at bottom of hero
       ------------------------------------------------------------------------- */
    .scroll-indicator{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%)}
    
    /* -------------------------------------------------------------------------
       FAQ ACCORDION STYLES - Expandable FAQ items
       ------------------------------------------------------------------------- */
    .faq-item{border-radius:1rem;overflow:hidden;margin-bottom:1rem}
    .faq-answer{max-height:0;overflow:hidden;transition:max-height .3s,opacity .3s;opacity:0}
    .faq-answer.open{max-height:500px;opacity:1}
    
    /* -------------------------------------------------------------------------
       WHATSAPP BUTTON - Floating contact button
       ------------------------------------------------------------------------- */
    .whatsapp-btn{
      position:fixed;
      bottom:1.5rem;
      right:1.5rem;
      z-index:50;
      width:3.5rem;
      height:3.5rem;
      background:#22c55e;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 20px rgba(34,197,94,.4);
      transition:all .3s
    }
    .whatsapp-btn:hover{
      transform:scale(1.1);
      box-shadow:0 6px 30px rgba(34,197,94,.5)
    }
    
    /* -------------------------------------------------------------------------
       MOBILE MENU STYLES - Hidden by default, shown on mobile
       ------------------------------------------------------------------------- */
    .mobile-menu{display:none;position:fixed;top:5rem;left:1rem;right:1rem;z-index:40}
    .mobile-menu.open{display:block}
    
    /* -------------------------------------------------------------------------
       RESPONSIVE STYLES - Mobile breakpoints
       ------------------------------------------------------------------------- */
    @media(max-width:768px){
      .section-title{font-size:2rem}
      .desktop-only{display:none}
      .mobile-menu-trigger{display:block}
    }
    
    /* -------------------------------------------------------------------------
       COUNT UP ANIMATION - Animated number counter
       ------------------------------------------------------------------------- */
    .count-up{
      font-size:2rem;
      font-weight:700;
      background:linear-gradient(135deg,#0ea5e9,#8b5cf6);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent
    }

       MODAL/POPUP STYLES - For portfolio project details
       ------------------------------------------------------------------------- */
    .modal-overlay{
      position:fixed;
      inset:0;
      z-index:100;
      background:rgba(0,0,0,.8);
      backdrop-filter:blur(4px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1rem
    }
    .modal-content{
      max-width:56rem;
      width:100%;
      max-height:90vh;
      overflow-y:auto;
      border-radius:1.5rem
    }

    // ==========================================================================

    const CountUp = ({ value, prefix = '', suffix = '' }) => {
      const [count, setCount] = useState(0);

      // Animated counter effect using setInterval
      useEffect(() => {
        let start = 0;
        const duration = 2000;  // Animation duration in milliseconds
        const increment = value / (duration / 16);  // 60fps timing
        
        const timer = setInterval(() => {
          start += increment;
          if (start >= value) {
            setCount(value);
            clearInterval(timer);
          } else {
            setCount(Math.floor(start));
          }
        }, 16);

        return () => clearInterval(timer);
      }, [value]);

      return <div className="count-up">{prefix}{count.toLocaleString()}{suffix}</div>;
    };
